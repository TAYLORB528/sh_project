# ═══════════════════════════════════════════════════════════════
# WebSocket Server Deployment
# ═══════════════════════════════════════════════════════════════
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-server
  labels:
    app: ws-server
spec:
  replicas: 2 # start with 2 pods
  selector:
    matchLabels:
      app: ws-server
  template:
    metadata:
      labels:
        app: ws-server
    spec:
      containers:
        - name: ws-server
          image: ribs-ws-server:latest
          imagePullPolicy: Never # use local Docker image (built below)
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: ribs-secrets
                  key: MONGODB_URI
            - name: VITE_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ribs-secrets
                  key: VITE_ANTHROPIC_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

# ═══════════════════════════════════════════════════════════════
# WebSocket Server Service (LoadBalancer exposes it externally)
# ═══════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Service
metadata:
  name: ws-server
spec:
  type: LoadBalancer
  selector:
    app: ws-server
  ports:
    - port: 3001
      targetPort: 3001

# ═══════════════════════════════════════════════════════════════
# Horizontal Pod Autoscaler
# Scales ws-server pods between 2 and 10 based on CPU usage.
# When avg CPU across pods exceeds 60%, it adds more pods.
# When load drops, it scales back down automatically.
# ═══════════════════════════════════════════════════════════════
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ws-server-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ws-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 10
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
