services:
  # ── Redis — shared message bus ────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── WebSocket server ──────────────────────────────────────────
  ws-server:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true

  # ── React frontend (dev server) ───────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_URL=ws://localhost:3001
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - ws-server
